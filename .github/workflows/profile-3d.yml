name: GitHub-Profile-3D-Contrib

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: Generate GitHub Profile 3D Contribution

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: yoshi389111/github-profile-3d-contrib@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: nithish-1622

      - name: Make SVG animations loop
        shell: bash
        run: |
          set -e
          shopt -s nullglob
          files=(profile-3d-contrib/*animate*.svg)
          for f in "${files[@]}"; do
            sed -i 's/repeatCount="1"/repeatCount="indefinite"/g' "$f"
          done

      - name: Deploy to profile-3d-contrib branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./profile-3d-contrib
          publish_branch: profile-3d-contrib
